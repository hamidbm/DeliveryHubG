services:
  mongodb:
    image: mongo:latest
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secretpassword
    networks:
      - delivery-network

  app:
    image: deliveryhub
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deliveryhub
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      MONGO_URL: mongodb://admin:secretpassword@mongodb:27017/delivery?authSource=admin
      API_KEY: ${API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      AI_DEFAULT_PROVIDER: OPEN_ROUTER
    depends_on:
      - mongodb
    networks:
      - delivery-network

volumes:
  mongo-data:

networks:
  delivery-network:
    driver: bridge
