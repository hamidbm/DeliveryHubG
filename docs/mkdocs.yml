#navigation:
#  tabs:
#    - Business Requirements
#    - Technical Documentation
#    - User Guides
#    - Development


theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: default
      # possible background colors: red, pink, purple, deep purple, indigo, blue, light blue, cyan, teal, green,
      # light green, lime, yellow, amber, orange, deep orange, brown, grey, blue grey
      # Best colors: red, light blue, green, indigo, purple
      primary: light blue # '#9FE2BF' indigo
      accent: blue
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - scheme: slate
      primary: red
      accent: purple
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  features:
    - navigation.tabs
    #- navigation.tabs.sticky
    - navigation.path
    - toc.follow
    - navigation.expand
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tracking
    - navigation.path
    - navigation.indexes
    - header.autohide
    - navigation.footer

plugins:
  - search
  #- offline
  #- tags
  - glightbox

extra:
  generator: false

markdown_extensions:
  - admonition
  - codehilite
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.details
  - pymdownx.superfences:
     custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  - attr_list
  - md_in_html
  - pymdownx.highlight:
      auto_title: true
      linenums: true
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true
  - mdx_math
  - def_list

extra_javascript:
  - assets/js/custom2.js
  - https://unpkg.com/katex@0/dist/katex.min.js
  - https://unpkg.com/katex@0/dist/contrib/auto-render.min.js
  - assets/js/katex-init.js

extra_css:
  - https://unpkg.com/katex@0/dist/katex.min.css
  - assets/css/extra.css
  #- assets/css/overrides.css
