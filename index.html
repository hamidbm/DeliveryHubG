
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexusDelivery Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8fafc;
    }
    /* Enforce rich text display in preview areas */
    .prose h1 { font-weight: 800; font-size: 3rem !important; margin-top: 2.5rem; margin-bottom: 1.5rem; color: #0f172a; letter-spacing: -0.05em; line-height: 1.1; display: block !important; }
    .prose h2 { font-weight: 700; font-size: 2.25rem !important; margin-top: 2rem; margin-bottom: 1rem; color: #1e293b; border-bottom: 2px solid #f1f5f9; padding-bottom: 0.5rem; display: block !important; }
    .prose h3 { font-weight: 700; font-size: 1.75rem !important; margin-top: 1.5rem; margin-bottom: 0.75rem; color: #334155; display: block !important; }
    .prose p { margin-bottom: 1.25rem; color: #475569; line-height: 1.8; font-size: 1.1rem; }
    
    /* FIX: Force bullets and numbering to be visible */
    .prose ul, .prose ul[style] { list-style-type: disc !important; padding-left: 2.5rem !important; margin-bottom: 1.5rem !important; display: block !important; }
    .prose ol, .prose ol[style] { list-style-type: decimal !important; padding-left: 2.5rem !important; margin-bottom: 1.5rem !important; display: block !important; }
    .prose li { margin-bottom: 0.75rem !important; display: list-item !important; color: #475569; }
    
    /* Table Styling */
    .prose table { width: 100%; border-collapse: collapse; margin-bottom: 2rem; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
    .prose th, .prose td { border: 1px solid #e2e8f0; padding: 1rem; text-align: left; }
    .prose th { background: #f8fafc; font-weight: 700; color: #1e293b; }
    
    .prose code { background: #f1f5f9; padding: 0.2rem 0.4rem; border-radius: 0.375rem; font-size: 0.875em; color: #e11d48; font-family: monospace; }
    .prose pre { background: #1e293b; color: #f8fafc; padding: 1.5rem; border-radius: 1rem; overflow-x: auto; margin-bottom: 1.5rem; font-family: monospace; font-size: 0.9em; }
    .prose blockquote { border-left: 6px solid #3b82f6; padding: 1.5rem; font-style: italic; color: #64748b; margin: 2rem 0; background: #f0f7ff; border-radius: 0 1rem 1rem 0; }
    .prose hr { border: 0; border-top: 2px solid #e2e8f0; margin: 3rem 0; }

    /* Cards Grid System */
    .wiki-content .cards {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 1.5rem;
      margin: 2rem 0;
    }
    .wiki-content .card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 1.5rem;
      padding: 1.5rem;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      display: flex;
      flex-direction: column;
    }
    .wiki-content .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
    }
    .wiki-content .card.accent {
      border-top: 4px solid #3b82f6;
    }
    .wiki-content .card.span-6 { grid-column: span 12; }
    @media (min-width: 768px) {
      .wiki-content .card.span-6 { grid-column: span 6; }
    }
    .wiki-content .card-title {
      font-weight: 800;
      font-size: 1.25rem !important;
      margin-top: 0 !important;
      margin-bottom: 0.25rem !important;
      color: #0f172a !important;
      border: none !important;
      padding-bottom: 0 !important;
    }
    .wiki-content .card-meta {
      font-size: 0.75rem !important;
      font-weight: 700 !important;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #94a3b8 !important;
      margin-bottom: 1rem !important;
    }
    .wiki-content .card p {
      font-size: 0.95rem !important;
      margin-bottom: 0 !important;
    }

    /* Enterprise Callout Styles */
    .wiki-content .callout {
      padding: 1.5rem;
      border-radius: 1.25rem;
      margin: 1.5rem 0;
      border-left: 5px solid transparent;
      position: relative;
    }
    .wiki-content .callout.info {
      background-color: #f0f9ff;
      border-left-color: #0ea5e9;
    }
    .wiki-content .callout.info .title {
      color: #0369a1;
    }
    .wiki-content .callout.warn {
      background-color: #fffbeb;
      border-left-color: #f59e0b;
    }
    .wiki-content .callout.warn .title {
      color: #b45309;
    }
    .wiki-content .callout.success {
      background-color: #f0fdf4;
      border-left-color: #22c55e;
    }
    .wiki-content .callout.success .title {
      color: #15803d;
    }
    .wiki-content .callout .title {
      font-weight: 800;
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .wiki-content .callout p {
      margin-bottom: 0;
      font-size: 0.95rem;
      color: #334155;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.35.0",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "mongodb": "https://esm.sh/mongodb@^7.0.0",
    "next": "https://esm.sh/next@^16.1.1",
    "next/": "https://esm.sh/next@^16.1.1/",
    "bcryptjs": "https://esm.sh/bcryptjs@^3.0.3",
    "jose": "https://esm.sh/jose@^6.1.3",
    "marked": "https://esm.sh/marked@^12.0.0",
    "dompurify": "https://esm.sh/dompurify@^3.3.1",
    "isomorphic-dompurify": "https://esm.sh/isomorphic-dompurify@^2.35.0"
  }
}
</script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
